services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: aas
      POSTGRES_USER: aas
      POSTGRES_PASSWORD: aas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aas -d aas"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aasminio
      MINIO_ROOT_PASSWORD: aasminio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 aasminio aasminio123; do sleep 2; done &&
      mc mb -p local/aas-media || true &&
      mc anonymous set download local/aas-media
      "

  migrate:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DEBUG: "False"
      DJANGO_SECRET_KEY: change-this-production-secret
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      POSTGRES_DB: aas
      POSTGRES_USER: aas
      POSTGRES_PASSWORD: aas
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      USE_S3_STORAGE: "True"
      AWS_ACCESS_KEY_ID: aasminio
      AWS_SECRET_ACCESS_KEY: aasminio123
      AWS_STORAGE_BUCKET_NAME: aas-media
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_S3_PROXY_URLS: "True"
      AWS_S3_REGION_NAME: us-east-1
      AWS_S3_ADDRESSING_STYLE: path
      AWS_QUERYSTRING_AUTH: "False"
      SERVE_MEDIA_FILES: "True"
      RUN_MIGRATIONS: "True"
      RUN_COLLECTSTATIC: "True"
    command: ["true"]

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DEBUG: "False"
      DJANGO_SECRET_KEY: change-this-production-secret
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      POSTGRES_DB: aas
      POSTGRES_USER: aas
      POSTGRES_PASSWORD: aas
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      USE_S3_STORAGE: "True"
      AWS_ACCESS_KEY_ID: aasminio
      AWS_SECRET_ACCESS_KEY: aasminio123
      AWS_STORAGE_BUCKET_NAME: aas-media
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_S3_PROXY_URLS: "True"
      AWS_S3_REGION_NAME: us-east-1
      AWS_S3_ADDRESSING_STYLE: path
      AWS_QUERYSTRING_AUTH: "False"
      SERVE_MEDIA_FILES: "True"
      RUN_MIGRATIONS: "False"
      RUN_COLLECTSTATIC: "False"

  training-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      backend:
        condition: service_started
    environment:
      DEBUG: "False"
      DJANGO_SECRET_KEY: change-this-production-secret
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      POSTGRES_DB: aas
      POSTGRES_USER: aas
      POSTGRES_PASSWORD: aas
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      USE_S3_STORAGE: "True"
      AWS_ACCESS_KEY_ID: aasminio
      AWS_SECRET_ACCESS_KEY: aasminio123
      AWS_STORAGE_BUCKET_NAME: aas-media
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_S3_PROXY_URLS: "True"
      AWS_S3_REGION_NAME: us-east-1
      AWS_S3_ADDRESSING_STYLE: path
      AWS_QUERYSTRING_AUTH: "False"
      SERVE_MEDIA_FILES: "True"
      TRAINING_WORK_DIR: /app/training_scratch
      RUN_MIGRATIONS: "False"
      RUN_COLLECTSTATIC: "False"
    volumes:
      - training_scratch:/app/training_scratch
    command: ["python", "manage.py", "run_training_jobs", "--loop", "--limit", "1", "--poll-interval", "5"]

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ""

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - minio
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  minio_data:
  training_scratch:
